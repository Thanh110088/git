<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        
    </style>
</head>
<div class="container">
        <h2>Biểu mẫu đăng ký</h2>
        <form action="#">
            <div class="form-group">
                <label>Họ và tên</label>
                <input type="text" placeholder="Enter full name">
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" placeholder="Enter email address">
            </div>

            <div class="row">
                <div class="col form-group">
                    <label>Số điện thoại</label>
                    <input type="text" placeholder="Enter phone number">
                </div>
                <div class="col form-group">
                    <label>Ngày sinh</label>
                    <input type="text" placeholder="dd/mm/yyyy" onfocus="(this.type='date')" onblur="(this.type='text')">
                </div>
            </div>

            <div class="form-group">
                <label>Giới tính</label>
                <div class="radio-group">
                    <label><input type="radio" name="gender" value="nam" checked> Nam</label>
                    <label><input type="radio" name="gender" value="nu"> Nữ</label>
                </div>
            </div>

            <div class="form-group">
                <label>Chọn khóa học</label>
                <select>
                    <option value="" disabled selected>Country</option> <option value="web">Lập trình web</option>
                    <option value="mobile">Lập trình di động</option>
                    <option value="design">Thiết kế web</option>
                    <option value="db">Cơ sở dữ liệu</option>
                </select>
            </div>

            <div class="btn-group">
                <button type="reset" class="btn btn-reset">Nhập lại</button>
                <button type="button" class="btn btn-submit">Đăng ký</button>
            </div>
        </form>

        <h2 class="table-title">Đã đăng ký</h2>
        <table>
            <thead>
                <tr>
                    <th class="center-text">STT</th>
                    <th>Môn học</th>
                    <th>Giảng viên</th>
                    <th class="center-text">Tác vụ</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td class="center-text">1</td>
                    <td>Lập trình web</td>
                    <td>Nguyễn Văn A</td>
                    <td class="center-text"><a href="#" class="cancel-link">Hủy đăng ký</a></td>
                </tr>
                <tr>
                    <td class="center-text">2</td>
                    <td>Lập trình di động</td>
                    <td>Nguyễn Văn A</td>
                    <td class="center-text"><a href="#" class="cancel-link">Hủy đăng ký</a></td>
                </tr>
                <tr>
                    <td class="center-text">3</td>
                    <td>Thiết kế web</td>
                    <td>Nguyễn Văn A</td>
                    <td class="center-text"><a href="#" class="cancel-link">Hủy đăng ký</a></td>
                </tr>
                <tr>
                    <td class="center-text">4</td>
                    <td>Cơ sở dữ liệu</td>
                    <td>Nguyễn Văn A</td>
                    <td class="center-text"><a href="#" class="cancel-link">Hủy đăng ký</a></td>
                </tr>
            </tbody>
        </table>
    </div>

</body>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
           const btnRegister=document.getElementById("btn-register");
           const btnReset=document.getElementById("btn-reset");
                 btnRegister.addEventListener("click",function(){
                    let name=document.getElementById("name").value.trim();
                    let email=document.getElementById("email").value.trim();
                    let phone=document.getElementById("phone").value.trim();
                    let dob=document.getElementById("dob").value;
                    let course=document.getElementById("course").value;

                    let isValid=true;
                    //kiểm tra regex
                        var mauTen=/^.+$/;
                    if(mauTen.test(name)){
                        document.getElementById("err-name").style.display="none";

                    }else{
                        document.getElementById("err-name").style.display="block";
                        isValid=false;
                    }
                        var mauEmail=/^\w+@\w+(\.\w+)+$/;
                    if(mauEmail.test(email)){
                        document.getElementById("err-email").style.display="none";
                    }else{
                        document.getElementById("err-email").style.display="block";
                        isValid=false;
                    }
                        var mauPhone=/^\d{1,10}$/;
                    if(mauPhone.test(phone)){
                        document.getElementById("err-phone").style.display="none";
                    }else{
                        document.getElementById("err-phone").style.display="block";
                        isValid=false;
                    }
                    if(dob!==""){
                        document.getElementById("err-dob").style.display="none";

                    }else{
                        document.getElementById("err-dob").style.display="block";
                        isValid=false;
                    }
                    if(course!==""){
                        document.getElementById("err-course").style.display="none";
                    }else{
                        document.getElementById("err-course").style.display="block";
                        isValid=false;
                    }
                //kiểm tra trùng lặp khóa học
                if(isValid){
                    const tbody=document.getElementById("table-body");
                    let rows=tbody.getElementsByTagName("tr");
                    for(let i=0;i<rows.length;i++){
                        if(rows[i].cells[1].innerText===course){
                            alert("Khóa học này đã được đăng kí bên dưới !");
                            isValid=false;
                            break;
                        }
                    }
                }

                if(isValid){
                    let rowhtml=`
                    <tr>
                        <td>STT</td>
                        <td>${course}</td>
                        <td>Nguyễn Văn A</td>
                        <td><button class="btn-delete" onclick="deleteRow(this)">Hủy đăng kí</button></td>
                    </tr>

                    `;
                

                let tbody=document.getElementById("table-body");
                tbody.innerHTML=tbody.innerHTML+rowhtml;

                reindex();
            }
        });
        //nút nhập lại
        btnReset.addEventListener("click",function(){
                document.getElementById("name").value="";
                document.getElementById("email").value="";
                document.getElementById("phone").value = "";
                document.getElementById("dob").value = "";
                document.getElementById("course").value = "";
            let errors=document.querySelectorAll(".error");
            errors.forEach(e=>e.style.display="none");


        });//đánh lại số từ đầu nếu có dòng tĩnh
        reindex();
    });
        //hàm xóa dòng
        function deleteRow(btn){
            if(confirm("Bạn có chắc chắn muốn hủy đắng kí khóa học này?")){
                let row=btn.parentElement.parentElement;
                row.remove();
                reindex();
            }
        }

        //hàm đánh lại số thứ tự
        function reindex(){
            let rows=document.querySelectorAll("#table-body tr");
            rows.forEach((row, index)=>{
                row.cells[0].innerText=index+1;
            });
        }
                 
        
    </script>
</body>
</html>
